<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Остатки ФБО — Ozon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --accent:#2f81f7;--accent-dim:rgba(47,129,247,0.12);
  --text:#e6edf3;--text-dim:#7d8590;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;
  --green-bg:rgba(63,185,80,0.1);--yellow-bg:rgba(210,153,34,0.1);--red-bg:rgba(248,81,73,0.1);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.08em;color:var(--accent)}
.logo span{color:var(--text-dim);font-weight:400}
.ts{font-family:var(--mono);font-size:11px;color:var(--text-dim)}

.wrap{max-width:1000px;margin:0 auto;padding:28px 20px}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.panel-label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text-dim)}

.btn-row{display:flex;gap:8px;align-items:center}
.btn{border:none;border-radius:7px;padding:10px 22px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:opacity .15s,transform .1s;letter-spacing:.04em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}

.spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.loading .spinner{display:block}
.loading .lbl{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.progress{height:2px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden;display:none}
.progress.on{display:block}
.pbar{height:100%;background:var(--accent);border-radius:2px;width:0;transition:width .3s}

.notice{border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.6;margin-bottom:14px;display:none}
.notice.on{display:block}
.notice.warn{background:var(--yellow-bg);border:1px solid rgba(210,153,34,.3);color:var(--yellow)}
.notice.err{background:var(--red-bg);border:1px solid rgba(248,81,73,.3);color:var(--red)}
.notice.ok{background:var(--green-bg);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.notice strong{font-weight:600}

.cards{display:none;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.cards.on{display:grid}
.card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px}
.card-lbl{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.card-val{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1}
.c-text{color:var(--text)}.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none}
.tbl-wrap.on{display:block}
.tbl-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.tbl-title{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.filters{display:flex;gap:6px}
.fbtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-family:var(--mono);font-size:10px;padding:3px 10px;cursor:pointer;transition:all .15s}
.fbtn:hover,.fbtn.active{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}

table{width:100%;border-collapse:collapse}
thead th{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);padding:9px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:11px 16px;font-family:var(--mono);font-size:12px;white-space:nowrap}
.td-art{color:var(--text);font-weight:500}
.td-wh{color:var(--text-dim);font-size:11px;max-width:220px;overflow:hidden;text-overflow:ellipsis}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;font-family:var(--mono)}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.badge.ok{background:var(--green-bg);color:var(--green)}
.badge.warn{background:var(--yellow-bg);color:var(--yellow)}
.badge.empty{background:var(--red-bg);color:var(--red)}

.empty-state{text-align:center;padding:52px 20px}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:500;margin-bottom:5px}
.empty-sub{color:var(--text-dim);font-size:13px;line-height:1.6}

@media(max-width:600px){
  .fields{grid-template-columns:1fr}
  .cards{grid-template-columns:repeat(2,1fr)}
  .topbar{padding:0 14px}
  .wrap{padding:16px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ФБО <span>/ Ozon Seller</span></div>
  <div class="ts" id="ts">—</div>
</div>

<div class="wrap">

  <div class="panel">
    <div class="panel-label">API-ключи Ozon Seller</div>
    <div class="fields">
      <div class="field">
        <label>Client-ID</label>
        <input type="text" id="cid" placeholder="например: 123456" autocomplete="off">
      </div>
      <div class="field">
        <label>API-Key</label>
        <input type="password" id="akey" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnFetch" onclick="doFetch()">
        <div class="spinner"></div>
        <span class="lbl">▶&nbsp; Получить остатки</span>
      </button>
      <button class="btn btn-ghost" onclick="clearKeys()">Очистить ключи</button>
    </div>
    <div class="progress" id="prog"><div class="pbar" id="pbar"></div></div>
  </div>

  <div class="notice warn" id="nWarn"></div>
  <div class="notice err"  id="nErr"></div>
  <div class="notice ok"   id="nOk"></div>

  <div class="cards" id="cards">
    <div class="card"><div class="card-lbl">Всего позиций</div><div class="card-val c-text"   id="cTotal">—</div></div>
    <div class="card"><div class="card-lbl">В норме</div>       <div class="card-val c-green"  id="cOk">—</div></div>
    <div class="card"><div class="card-lbl">Заканчивается</div><div class="card-val c-yellow" id="cWarn">—</div></div>
    <div class="card"><div class="card-lbl">Нет остатка</div>  <div class="card-val c-red"    id="cBad">—</div></div>
  </div>

  <div class="tbl-wrap" id="tblWrap">
    <div class="tbl-top">
      <div class="tbl-title" id="tblTitle">Остатки по складам</div>
      <div class="filters">
        <button class="fbtn active" onclick="setFilter('all',this)">Все</button>
        <button class="fbtn" onclick="setFilter('warn',this)">⚠ Мало</button>
        <button class="fbtn" onclick="setFilter('empty',this)">⛔ Нет</button>
      </div>
    </div>
    <div id="tblInner">
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <div class="empty-title">Введите ключи и нажмите кнопку</div>
        <div class="empty-sub">Данные загрузятся прямо здесь</div>
      </div>
    </div>
  </div>

</div>

<script>
const MIN_STOCK = 12;
let allRows = [], activeFilter = 'all';

window.addEventListener('DOMContentLoaded', () => {
  try {
    const c = localStorage.getItem('oz_cid'), a = localStorage.getItem('oz_ak');
    if(c) document.getElementById('cid').value = c;
    if(a) document.getElementById('akey').value = a;
  } catch(e){}
  tick();
  setInterval(tick, 1000);
});

function tick(){
  const n = new Date();
  document.getElementById('ts').textContent =
    n.toLocaleDateString('ru-RU') + '  ' +
    n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function notice(type, html){
  ['Warn','Err','Ok'].forEach(t=>{
    const el = document.getElementById('n'+t);
    if(t.toLowerCase()===type){ el.innerHTML=html; el.classList.add('on'); }
    else el.classList.remove('on');
  });
}
function clearNotices(){ ['Warn','Err','Ok'].forEach(t=>document.getElementById('n'+t).classList.remove('on')); }

function prog(pct){
  const el=document.getElementById('prog'), bar=document.getElementById('pbar');
  if(pct===null){ el.classList.remove('on'); bar.style.width='0%'; return; }
  el.classList.add('on'); bar.style.width=pct+'%';
}

async function doFetch(){
  const cid=document.getElementById('cid').value.trim();
  const akey=document.getElementById('akey').value.trim();
  if(!cid||!akey){ notice('warn','<strong>Заполните оба поля:</strong> Client-ID и API-Key'); return; }
  try{ localStorage.setItem('oz_cid',cid); localStorage.setItem('oz_ak',akey); }catch(e){}

  const btn=document.getElementById('btnFetch');
  btn.disabled=true; btn.classList.add('loading');
  clearNotices();
  document.getElementById('cards').classList.remove('on');
  document.getElementById('tblWrap').classList.remove('on');
  prog(10);

  try{
    const rows = await loadStocks(cid, akey);
    allRows = rows;
    prog(95);
    renderCards(rows);
    renderTable(rows);
    prog(null);
    document.getElementById('cards').classList.add('on');
    document.getElementById('tblWrap').classList.add('on');
    if(rows.length===0){
      notice('warn','API вернул пустой список. Проверьте, что у аккаунта есть товары на ФБО.');
    } else {
      notice('ok','✅ Загружено. Всего позиций: <strong>'+rows.length+'</strong>');
    }
  } catch(e){
    prog(null);
    const m=e.message||'';
    if(m.includes('401')) notice('err','<strong>Ошибка 401 — неверные ключи.</strong> Проверьте Client-ID и API-Key в кабинете Ozon.');
    else if(m.includes('403')) notice('err','<strong>Ошибка 403 — нет прав.</strong> Убедитесь, что у ключа есть доступ к складу и товарам.');
    else if(m.includes('429')) notice('err','<strong>Ошибка 429 — слишком много запросов.</strong> Подождите минуту и нажмите снова.');
    else if(m.includes('Failed to fetch')||m.includes('NetworkError')) notice('err','<strong>Ошибка сети.</strong> Проверьте интернет-соединение и попробуйте снова.');
    else notice('err','<strong>Ошибка:</strong> '+esc(m));
  } finally{
    btn.disabled=false; btn.classList.remove('loading');
  }
}

async function loadStocks(cid, akey){
  const headers={'Client-Id':cid,'Api-Key':akey,'Content-Type':'application/json'};
  let items=[], lastId='', hasMore=true;

  while(hasMore){
    const resp = await fetch('https://api-seller.ozon.ru/v3/product/info/stocks',{
      method:'POST', headers,
      body:JSON.stringify({filter:{visibility:'ALL'}, last_id:lastId, limit:100})
    });
    if(!resp.ok){
      const txt=await resp.text().catch(()=>'');
      throw new Error(resp.status+' '+txt.slice(0,200));
    }
    const data=await resp.json();
    const batch=data?.result?.items||[];
    items=items.concat(batch);
    const total=data?.result?.total||0;
    lastId=data?.result?.last_id||'';
    hasMore=batch.length===100&&items.length<total&&!!lastId;
    prog(Math.min(88, 10+items.length/Math.max(total,1)*78));
  }

  const rows=[];
  for(const item of items){
    for(const s of (item.stocks||[])){
      if(s.type!=='fbo') continue;
      rows.push({offer_id:item.offer_id||'', warehouse:s.warehouse_name||'—', present:s.present||0, reserved:s.reserved||0});
    }
  }
  rows.sort((a,b)=>{
    const sa=a.present===0?0:a.present<MIN_STOCK?1:2;
    const sb=b.present===0?0:b.present<MIN_STOCK?1:2;
    return sa!==sb?sa-sb:a.offer_id.localeCompare(b.offer_id);
  });
  return rows;
}

function renderCards(rows){
  document.getElementById('cTotal').textContent=rows.length;
  document.getElementById('cOk').textContent=rows.filter(r=>r.present>=MIN_STOCK).length;
  document.getElementById('cWarn').textContent=rows.filter(r=>r.present>0&&r.present<MIN_STOCK).length;
  document.getElementById('cBad').textContent=rows.filter(r=>r.present===0).length;
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(allRows);
}

function renderTable(rows){
  const filtered=activeFilter==='all'?rows
    :activeFilter==='warn'?rows.filter(r=>r.present>0&&r.present<MIN_STOCK)
    :rows.filter(r=>r.present===0);

  document.getElementById('tblTitle').textContent=
    activeFilter==='all'?'Все позиции ('+filtered.length+')'
    :activeFilter==='warn'?'Заканчивается ('+filtered.length+')'
    :'Нет остатка ('+filtered.length+')';

  if(!filtered.length){
    document.getElementById('tblInner').innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">Таких позиций нет</div></div>';
    return;
  }
  let html='<table><thead><tr><th>Артикул</th><th>Склад</th><th>Доступно</th><th>Резерв</th><th>Статус</th></tr></thead><tbody>';
  for(const r of filtered){
    const isEmpty=r.present===0, isWarn=r.present>0&&r.present<MIN_STOCK;
    const cls=isEmpty?'empty':isWarn?'warn':'ok';
    const lbl=isEmpty?'Нет':isWarn?'Мало':'OK';
    const color=isEmpty?'var(--red)':isWarn?'var(--yellow)':'var(--green)';
    const wh=esc(r.warehouse);
    html+=`<tr><td class="td-art">${esc(r.offer_id)}</td><td class="td-wh" title="${wh}">${wh.replace(/,.*$/,'')}</td><td style="font-family:var(--mono);font-weight:600;color:${color}">${r.present}</td><td style="font-family:var(--mono);color:var(--text-dim)">${r.reserved}</td><td><span class="badge ${cls}">${lbl}</span></td></tr>`;
  }
  html+='</tbody></table>';
  document.getElementById('tblInner').innerHTML=html;
}

function clearKeys(){
  document.getElementById('cid').value='';
  document.getElementById('akey').value='';
  try{localStorage.removeItem('oz_cid');localStorage.removeItem('oz_ak');}catch(e){}
  clearNotices();
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
